version: 2

models:
  - name: stg_orders
    description: "Clean types and keys from raw_orders; base for all downstream models."
    columns:
      - name: order_item_id
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_profit_per_order
        tests:
          - not_null
      - name: sla_breached
        tests:
          - accepted_values:
              arguments:
                values: ["Yes", "No"]
